name: Release

on:
  push:
    branches:
      - main
    paths:
      - "package.json"

jobs:
  tag:
    name: Create version tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      created: ${{ steps.tag_check.outputs.exists == 'false' }}
      version: ${{ steps.pkg.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.pkg.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git tag "v${{ steps.pkg.outputs.version }}"
          git push origin "v${{ steps.pkg.outputs.version }}"

  build:
    name: Build (${{ matrix.output }})
    needs: tag
    if: needs.tag.outputs.created == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            output: starless-linux-x64
          - target: bun-darwin-x64
            output: starless-macos-x64
          - target: bun-darwin-arm64
            output: starless-macos-arm64
          - target: bun-windows-x64
            output: starless-windows-x64.exe

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun build --compile --target=${{ matrix.target }} index.ts --outfile dist/${{ matrix.output }} --production --bytecode

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  release:
    name: Create GitHub Release
    needs: [tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.tag.outputs.version }}
          files: |
            dist/*
          generate_release_notes: true
